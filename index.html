<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Timer Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --orange: #ff9800; 
            --white: #ffffff; 
            --gray-active: #757575; 
            --bg: #f8f9fa; 
            --dark: #212529; 
            --danger: #dc3545;
            --success: #198754;
        }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; justify-content: center; }
        
        .screen { width: 100%; max-width: 500px; min-height: 100vh; background: white; display: none; padding: 20px; box-sizing: border-box; }
        .active { display: block; }

        /* HOME SCREEN - CLEAN */
        .home-header { text-align: center; margin-bottom: 60px; margin-top: 50px; }
        .home-header h1 { font-size: 2.5rem; color: var(--dark); margin: 0; font-weight: 800; }
        .home-header p { color: #6c757d; font-weight: 500; margin-top: 10px; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .menu-card { 
            padding: 35px; border-radius: 20px; border: none; color: white; cursor: pointer; 
            display: flex; align-items: center; justify-content: space-between; 
            font-size: 1.6rem; font-weight: 800; background: var(--orange); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); transition: transform 0.1s;
        }
        .menu-card i {
            font-size: 2.8rem;
            opacity: 0.9;
        }
        .menu-card:active { transform: scale(0.97); }
        .rtg-btn { background: #0891b2; }

        /* TIMER SCREEN UI */
        .back-btn { background: #f1f3f5; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 20px; color: var(--dark); display: flex; align-items: center; gap: 8px; }
        .section-card { border-top: 10px solid var(--orange); padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .mode-toggle { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 15px; border-radius: 12px; border: 2px solid #dee2e6; background: white; font-weight: 800; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .mode-btn.active { background: var(--dark); color: white; border-color: var(--dark); }

        /* Modified Input Grids */
        .id-inputs-qc { display: grid; grid-template-columns: 1.2fr 75px 1.5fr; gap: 8px; margin-bottom: 15px; }
        .id-inputs-rtg { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        
        input, select { padding: 12px; border: 1px solid #ced4da; border-radius: 10px; font-size: 0.9rem; width: 100%; box-sizing: border-box; outline: none; background: white; }
        .qc-no-box { text-align: center; }

        .timer-container { background: var(--dark); color: #0dcaf0; padding: 25px; border-radius: 15px; text-align: center; margin: 15px 0; position: relative; }
        .timer { font-size: 4rem; font-weight: 800; font-family: 'Courier New', Courier, monospace; }
        .cycle-badge { position: absolute; top: 10px; right: 10px; background: var(--orange); color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }

        .muda-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: 800; background: #e9ecef; margin-bottom: 8px; cursor: pointer; font-size: 1rem; color: #495057; }
        .muda-on { background: var(--danger) !important; color: white; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.7; } }
        
        .reset-btn { width: 100%; padding: 12px; border: 2px solid #dee2e6; border-radius: 12px; font-weight: 800; background: white; color: #6c757d; cursor: pointer; margin-bottom: 20px; transition: 0.2s; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-step { 
            height: 85px; border: none; border-radius: 15px; font-size: 0.8rem; font-weight: 700; 
            color: var(--white); background: var(--orange); cursor: pointer; 
            display: flex; align-items: center; justify-content: center; text-align: center; 
            padding: 10px; line-height: 1.2; transition: background 0.2s;
        }
        .step-active { background: var(--gray-active) !important; }
        .btn-step:disabled { opacity: 0.35; cursor: not-allowed; }

        .report-btn { width: 100%; padding: 18px; border: none; border-radius: 15px; background: var(--dark); color: white; font-weight: 800; margin-top: 25px; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

    <!-- MASTER HOME PAGE -->
    <div id="home-screen" class="screen active">
        <div class="home-header">
            <h1>Cycle Timer</h1>
            <p>Terminal Operations Dashboard</p>
        </div>

        <div class="menu-grid">
            <button class="menu-card" onclick="showScreen('qc-screen')">
                <span>QUAY CRANE</span>
                <i class="fa-solid fa-ship"></i>
            </button>
            <button class="menu-card rtg-btn" onclick="showScreen('rtg-screen')">
                <span>RTG CRANE</span>
                <i class="fa-solid fa-truck-ramp-box"></i>
            </button>
        </div>
    </div>

    <!-- QC TIMER SCREEN -->
    <div id="qc-screen" class="screen">
        <button class="back-btn" onclick="showScreen('home-screen')"><i class="fas fa-arrow-left"></i> HOME</button>
        <div class="section-card">
            <div class="mode-toggle">
                <button id="qc-m-load" class="mode-btn active" onclick="setMode('QC', 'LOADING')">LOADING</button>
                <button id="qc-m-dis" class="mode-btn" onclick="setMode('QC', 'DISCHARGING')">DISCHARGING</button>
            </div>
            
            <div class="id-inputs-qc">
                <input type="text" id="qcStaffId" placeholder="STAFF ID">
                <input type="text" id="qcNo" class="qc-no-box" placeholder="QC#" maxlength="2">
                <select id="qcCategory">
                    <option value="Above deck">Above deck</option>
                    <option value="Below deck">Below deck</option>
                    <option value="hatch cover">Hatch cover</option>
                    <option value="OOG">OOG</option>
                    <option value="RORO">RORO</option>
                </select>
            </div>
            
            <div class="timer-container">
                <div class="cycle-badge">CYCLES: <span id="qc-cycle-count">0</span></div>
                <div class="timer" id="qc-timer">0.00</div>
            </div>
            
            <button id="qc-muda" class="muda-btn" onclick="toggleMuda('QC')" disabled>PAUSE (MUDA)</button>
            <button class="reset-btn" onclick="resetCurrentTimer('QC')">RESET CURRENT TIMER</button>
            
            <div id="qc-btns" class="btn-grid"></div>
            
            <button class="report-btn" onclick="downloadReport('QC')">DOWNLOAD QC REPORT</button>
        </div>
    </div>

    <!-- RTG TIMER SCREEN -->
    <div id="rtg-screen" class="screen">
        <button class="back-btn" onclick="showScreen('home-screen')"><i class="fas fa-arrow-left"></i> HOME</button>
        <div class="section-card" style="border-top-color:#0891b2">
            <div class="mode-toggle">
                <button id="rtg-m-load" class="mode-btn active" onclick="setMode('RTG', 'LOADING')">LOADING</button>
                <button id="rtg-m-dis" class="mode-btn" onclick="setMode('RTG', 'DISCHARGE')">DISCHARGE</button>
            </div>

            <div class="id-inputs-rtg">
                <input type="text" id="rtgStaffId" placeholder="STAFF ID">
                <input type="text" id="rtgNo" placeholder="RTG NO.">
            </div>
            
            <div class="timer-container">
                <div class="cycle-badge">CYCLES: <span id="rtg-cycle-count">0</span></div>
                <div class="timer" id="rtg-timer">0.00</div>
            </div>
            
            <button id="rtg-muda" class="muda-btn" onclick="toggleMuda('RTG')" disabled>PAUSE (MUDA)</button>
            <button class="reset-btn" onclick="resetCurrentTimer('RTG')">RESET CURRENT TIMER</button>
            
            <div id="rtg-btns" class="btn-grid"></div>
            
            <button class="report-btn" onclick="downloadReport('RTG')" style="background:#0891b2">DOWNLOAD RTG REPORT</button>
        </div>
    </div>

<script>
    let masterLogs = [];
    let counts = { QC: 0, RTG: 0 };
    let state = {
        QC: { mode: 'LOADING', startTime: null, lastTime: null, interval: null, isPaused: false, mudaStart: null },
        RTG: { mode: 'LOADING', startTime: null, lastTime: null, interval: null, isPaused: false, mudaStart: null }
    };

    const config = {
        QC: {
            LOADING: [
                "1. FROM PARK POSITION TO ADJUST ON TRUCK",
                "2. FROM START ADJUSTING ON TRUCK TO LOCK CONTAINER",
                "3. FROM LOCK ON CONTAINER TO SILL BEAM",
                "4. FROM SILL BEAM TO START ADJUSTING ON TARGET ROW",
                "5. FROM START ADJUSTING ON ROW TO UNLOCK",
                "6. FROM UNLOCK TO SILL BEAM"
            ],
            DISCHARGING: [
                "1. FROM PARK TO SILL BEAM TO TARGET ROW",
                "2. FROM START ADJUSTING ON CONTAINER TO LOCK",
                "3. FROM LOCK TO SILL BEAM",
                "4. FROM SILL BEAM TO START ADJUSTING ON TRUCK",
                "5. FROM START ADJUSTING ON TRUCK TO UNLOCK",
                "6. FROM UNLOCK TRUCK TO SILL BEAM/PARK"
            ]
        },
        RTG: {
            LOADING: [
                "1. FROM STANDBY TO LOCK CONTAINER IN BAY",
                "2. FROM LOCK IN THE BAY TO A-ROW",
                "3. FROM A-ROW TO UNLOCK ON TRUCK",
                "4. FROM UNLOCK ON TRUCK TO PARK POSITION"
            ],
            DISCHARGE: [
                "1. FROM PARK POSITION TO LOCK ON TRUCK",
                "2. FROM LOCK ON TRUCK TO UNLOCK ON TARGET ROW",
                "3. FROM UNLOCK TO PARK POSITION"
            ]
        }
    };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id !== 'home-screen') render(id.split('-')[0].toUpperCase());
    }

    function setMode(crane, mode) {
        if(state[crane].startTime) return;
        state[crane].mode = mode;
        const p = crane.toLowerCase();
        document.getElementById(`${p}-m-load`).className = mode.includes('LOAD') ? 'mode-btn active' : 'mode-btn';
        document.getElementById(`${p}-m-dis`).className = !mode.includes('LOAD') ? 'mode-btn active' : 'mode-btn';
        render(crane);
    }

    function render(crane) {
        const container = document.getElementById(crane.toLowerCase() + '-btns');
        container.innerHTML = '';
        const steps = config[crane][state[crane].mode];
        steps.forEach((text, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn-step';
            btn.disabled = i !== 0;
            btn.id = `${crane}-s${i+1}`;
            btn.innerText = text;
            btn.onclick = () => triggerStep(crane, i + 1);
            container.appendChild(btn);
        });
    }

    function triggerStep(crane, stepNum) {
        const now = Date.now();
        const s = state[crane];
        const mode = s.mode;
        const steps = config[crane][mode];

        if (navigator.vibrate) navigator.vibrate(40);

        if (stepNum === 1) {
            s.startTime = now;
            s.currentCycle = { 
                Date: new Date().toLocaleDateString(), 
                Time: new Date().toLocaleTimeString(),
                Equipment: crane, 
                Unit_No: document.getElementById(crane.toLowerCase() + 'No').value || "N/A", 
                Staff_ID: document.getElementById(crane.toLowerCase() + 'StaffId').value || "N/A", 
                Category: crane === 'QC' ? document.getElementById('qcCategory').value : "N/A",
                Operation: mode 
            };
            document.getElementById(crane.toLowerCase() + '-muda').disabled = false;
            s.interval = setInterval(() => {
                document.getElementById(crane.toLowerCase()+'-timer').innerText = ((Date.now() - s.startTime)/1000).toFixed(2);
            }, 50);
        } else {
            s.currentCycle['Step_'+(stepNum-1)] = ((now - s.lastTime) / 1000).toFixed(2);
        }

        for(let i=1; i<=steps.length; i++) {
            const btn = document.getElementById(`${crane}-s${i}`);
            btn.disabled = true;
            btn.classList.remove('step-active');
        }
        document.getElementById(`${crane}-s${stepNum}`).classList.add('step-active');

        if (stepNum === steps.length) {
            clearInterval(s.interval);
            s.currentCycle['Step_'+stepNum] = ((now - s.lastTime) / 1000).toFixed(2);
            s.currentCycle['Total_Cycle_Time'] = ((now - s.startTime) / 1000).toFixed(2);
            masterLogs.push({...s.currentCycle});
            counts[crane]++;
            document.getElementById(crane.toLowerCase() + '-cycle-count').innerText = counts[crane];
            document.getElementById(crane.toLowerCase() + '-muda').disabled = true;
            setTimeout(() => resetCrane(crane), 1500);
        } else {
            document.getElementById(`${crane}-s${stepNum+1}`).disabled = false;
        }
        s.lastTime = now;
    }

    function toggleMuda(crane) {
        const s = state[crane];
        const btn = document.getElementById(crane.toLowerCase() + '-muda');
        if (!s.isPaused) {
            s.isPaused = true;
            s.mudaStart = Date.now();
            btn.classList.add('muda-on');
            clearInterval(s.interval);
        } else {
            s.isPaused = false;
            let pauseDuration = (Date.now() - s.mudaStart);
            s.startTime += pauseDuration;
            s.lastTime += pauseDuration;
            btn.classList.remove('muda-on');
            s.interval = setInterval(() => {
                document.getElementById(crane.toLowerCase()+'-timer').innerText = ((Date.now() - s.startTime)/1000).toFixed(2);
            }, 50);
        }
    }

    function resetCurrentTimer(crane) {
        if(confirm("Discard current measurement?")) resetCrane(crane);
    }

    function resetCrane(crane) {
        const s = state[crane];
        clearInterval(s.interval);
        s.startTime = null;
        s.isPaused = false;
        document.getElementById(crane.toLowerCase()+'-timer').innerText = "0.00";
        document.getElementById(crane.toLowerCase()+'-muda').disabled = true;
        document.getElementById(crane.toLowerCase()+'-muda').classList.remove('muda-on');
        render(crane);
    }

    function downloadReport(type) {
        const filtered = masterLogs.filter(log => log.Equipment === type);
        if (filtered.length === 0) return alert("No recorded cycles found.");
        const headers = Object.keys(filtered[0]).join(",");
        let csv = "data:text/csv;charset=utf-8," + headers + "\n" + filtered.map(r => Object.values(r).join(",")).join("\n");
        const link = document.createElement("a");
        link.href = encodeURI(csv);
        link.download = `${type}_Cycle_Report_${new Date().toLocaleDateString().replace(/\//g,'-')}.csv`;
        link.click();
    }
</script>
</body>
</html>

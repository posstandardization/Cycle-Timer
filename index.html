<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Timer Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --orange: #ff9800; 
            --white: #ffffff; 
            --gray-active: #757575; 
            --bg: #f8f9fa; 
            --dark: #212529; 
            --danger: #ef4444;
            --success: #10b981;
            --ct-blue: #0891b2;
            --mr-teal: #0d9488;
            --tech-pause: #f59e0b;
            --tech-wait: #06b6d4;
            --tech-reset: #4b5563;
            --tech-dark-grey: #374151;
        }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; justify-content: center; position: relative; min-height: 100vh; }
        
        .screen { width: 100%; max-width: 500px; min-height: 100vh; background: white; display: none; padding: 20px; box-sizing: border-box; position: relative; }
        .active { display: block; }

        /* HEADER */
        .home-header { text-align: center; margin-top: 40px; margin-bottom: 30px; }
        .home-header h1 { font-size: 2.2rem; color: var(--dark); margin: 0; font-weight: 800; }
        .home-header p { color: #6c757d; font-weight: 500; margin-top: 5px; }
        
        /* NAVIGATION CARDS */
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .menu-card { 
            padding: 30px; border-radius: 20px; border: none; color: white; cursor: pointer; 
            display: flex; align-items: center; justify-content: space-between; 
            font-size: 1.4rem; font-weight: 800; background: var(--orange); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); transition: transform 0.1s;
        }
        .menu-card i { font-size: 2.4rem; opacity: 0.9; }
        .menu-card:active { transform: scale(0.97); }
        
        .ct-btn { background: var(--orange); }
        .gct-btn { background: var(--ct-blue); }
        .mr-btn { background: var(--mr-teal); }

        /* DEVELOPER CREDIT */
        .developer-credit { 
            margin-top: 80px;
            margin-bottom: 20px;
            text-align: right;
            font-size: 0.65rem; 
            color: #000000; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }

        /* EQUIPMENT GRID */
        .equip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .equip-item { 
            padding: 20px 10px; border-radius: 15px; border: none; background: var(--orange); 
            color: white; font-weight: 800; font-size: 1rem; cursor: pointer; text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .equip-item:active { opacity: 0.9; transform: translateY(2px); }

        /* TIMER SCREEN UI */
        .back-btn { background: #f1f3f5; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 20px; color: var(--dark); display: flex; align-items: center; gap: 8px; }
        .section-card { border-top: 10px solid var(--orange); padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .mode-toggle { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 15px; border-radius: 12px; border: 2px solid #dee2e6; background: white; font-weight: 800; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .mode-btn.active { background: var(--dark); color: white; border-color: var(--dark); }

        .id-inputs-generic { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .id-inputs-qc, .id-inputs-gct, .id-inputs-tt { display: grid; grid-template-columns: 1fr 65px 1.5fr; gap: 8px; margin-bottom: 8px; }
        .id-inputs-loose { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .full-width-input { grid-column: span 3; margin-top: 5px; }
        
        input, select { padding: 12px; border: 1px solid #ced4da; border-radius: 10px; font-size: 0.85rem; width: 100%; box-sizing: border-box; outline: none; background: white; }
        .qc-no-box { text-align: center; }

        .timer-container { background: var(--dark); color: #0dcaf0; padding: 25px; border-radius: 15px; text-align: center; margin: 15px 0; position: relative; }
        .timer { font-size: 3.5rem; font-weight: 800; font-family: 'Courier New', Courier, monospace; }
        .cycle-badge { position: absolute; top: 10px; right: 10px; background: var(--orange); color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }

        /* Technical Buttons Styling */
        .delay-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        
        .pause-btn, .wait-btn, .reset-btn { 
            padding: 16px; border: none; border-radius: 12px; font-weight: 800; 
            cursor: pointer; font-size: 0.9rem; transition: all 0.2s; display: flex; 
            align-items: center; justify-content: center; gap: 10px;
            background: var(--tech-dark-grey); 
            color: white; 
        }

        .pause-btn:disabled, .wait-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .pause-on { background: var(--tech-pause) !important; color: white !important; animation: pulse 1.5s infinite; }
        .wait-on { background: var(--tech-wait) !important; color: white !important; animation: pulse 1.5s infinite; }

        .reset-btn { width: 100%; margin-bottom: 20px; background: var(--tech-reset); }
        .reset-btn:active { background: #1f2937; }
        .reset-btn i { color: white; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-step { 
            height: 85px; border: none; border-radius: 15px; font-size: 0.75rem; font-weight: 700; 
            color: var(--white); background: var(--orange); cursor: pointer; 
            display: flex; align-items: center; justify-content: center; text-align: center; 
            padding: 8px; line-height: 1.2; transition: background 0.2s;
        }
        .step-active { background: var(--gray-active) !important; }
        .btn-step:disabled { opacity: 0.35; cursor: not-allowed; }

        .report-btn { width: 100%; padding: 18px; border: none; border-radius: 15px; background: var(--dark); color: white; font-weight: 800; margin-top: 25px; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

    <!-- MASTER HOME PAGE -->
    <div id="home-screen" class="screen active">
        <div class="home-header">
            <h1>Cycle Timer</h1>
            <p>Main Selection Dashboard</p>
        </div>

        <div class="menu-grid">
            <button class="menu-card ct-btn" onclick="showScreen('ct-ops-screen')">
                <span>CT OPS</span>
                <i class="fa-solid fa-ship"></i>
            </button>
            <button class="menu-card gct-btn" onclick="showScreen('gct-ops-screen')">
                <span>GCT OPS</span>
                <i class="fa-solid fa-boxes-stacked"></i>
            </button>
            <button class="menu-card mr-btn" onclick="showScreen('mr-screen')">
                <span>M&R</span>
                <i class="fa-solid fa-screwdriver-wrench"></i>
            </button>
        </div>

        <div class="developer-credit">Developed By: Mr. Golden Micheal - Port of Salalah.</div>
    </div>

    <!-- CT OPS MENU SCREEN -->
    <div id="ct-ops-screen" class="screen">
        <button class="back-btn" onclick="showScreen('home-screen')"><i class="fas fa-arrow-left"></i> BACK</button>
        <h2 style="text-align:center; color: var(--orange);">CT OPERATIONS</h2>
        <div class="equip-grid">
            <button class="equip-item" onclick="startTimer('QC')">QC</button>
            <button class="equip-item" onclick="startTimer('RTG')">RTG</button>
            <button class="equip-item" onclick="startTimer('TT')">TT</button>
            <button class="equip-item" onclick="startTimer('EH')">EH</button>
            <button class="equip-item" onclick="startTimer('RS')">RS</button>
            <button class="equip-item" onclick="startTimer('FLT')">FLT</button>
            <button class="equip-item" onclick="startTimer('LASHER')">LASHER</button>
            <button class="equip-item" onclick="startTimer('DOWELMAN')">DOWELMAN</button>
        </div>
    </div>

    <!-- GCT OPS MENU SCREEN -->
    <div id="gct-ops-screen" class="screen">
        <button class="back-btn" onclick="showScreen('home-screen')"><i class="fas fa-arrow-left"></i> BACK</button>
        <h2 style="text-align:center; color: var(--ct-blue);">GCT OPERATIONS</h2>
        <div class="equip-grid">
            <button class="equip-item" style="background:var(--ct-blue)" onclick="startTimer('MHC_LOOSE')">MHC Loose cargo</button>
            <button class="equip-item" style="background:var(--ct-blue)" onclick="startTimer('LASHER')">LASHER</button>
            <button class="equip-item" style="background:var(--ct-blue)" onclick="startTimer('BAGGED_CARGO')">Crane- bagged cargo</button>
            <button class="equip-item" style="background:var(--ct-blue)" onclick="startTimer('FLT')">FLT</button>
            <button class="equip-item" style="background:var(--ct-blue)" onclick="startTimer('RTG')">RTG</button>
            <button class="equip-item" style="background:var(--ct-blue)" onclick="startTimer('RS')">RS</button>
        </div>
    </div>

    <!-- M&R SCREEN -->
    <div id="mr-screen" class="screen">
        <button class="back-btn" onclick="showScreen('home-screen')"><i class="fas fa-arrow-left"></i> BACK</button>
        <h2 style="text-align:center; color: var(--mr-teal);">M&R</h2>
        <div class="equip-grid">
            <button class="equip-item" style="background:var(--mr-teal); grid-column: span 2;" onclick="startTimer('M&R')">M&R LOG</button>
        </div>
    </div>

    <!-- GENERIC TIMER SCREEN -->
    <div id="timer-screen" class="screen">
        <button id="timer-back-btn" class="back-btn"><i class="fas fa-arrow-left"></i> BACK</button>
        <div class="section-card" id="timer-card">
            <div class="mode-toggle">
                <button id="m-load" class="mode-btn active" onclick="updateMode('LOADING')">LOADING</button>
                <button id="m-dis" class="mode-btn" onclick="updateMode('DISCHARGE')">DISCHARGE</button>
            </div>
            
            <div id="input-container">
                <!-- Inputs injected dynamically -->
            </div>
            
            <div class="timer-container">
                <div class="cycle-badge">CYCLES: <span id="cycle-count">0</span></div>
                <div class="timer" id="main-timer">0.00</div>
            </div>
            
            <div class="delay-controls">
                <button id="pause-btn" class="pause-btn" onclick="togglePause()" disabled>
                    <i class="fa-solid fa-pause"></i> PAUSE
                </button>
                <button id="wait-btn" class="wait-btn" onclick="toggleWaiting()" disabled>
                    <i class="fa-solid fa-clock"></i> WAITING
                </button>
            </div>
            <button class="reset-btn" onclick="resetCurrentTimer()">
                <i class="fa-solid fa-rotate-left"></i> RESET CURRENT TIMER
            </button>
            
            <div id="step-btns" class="btn-grid"></div>
            
            <button class="report-btn" id="dl-report-btn">DOWNLOAD REPORT</button>
        </div>
    </div>

<script>
    let masterLogs = [];
    let currentCrane = '';
    let currentMode = 'LOADING';
    let currentCounts = {};
    let activeInterval = null;
    let startTime = null;     
    let absoluteStartTime = null; 
    let lastTime = null;
    let isPaused = false;
    let isWaiting = false;
    let delayStart = null;
    let totalWaitingDuration = 0; 
    let currentCycleData = {};
    let parentScreen = 'home-screen';

    const config = {
        QC: {
            LOADING: [
                "1. FROM PARK POSITION TO ADJUST ON TRUCK", 
                "2. FROM START ADJUSTING ON TRUCK TO TO LOCK THE CONTAINER ON TRUCK", 
                "3. FROM LOCK ON CONTAINER ON TRUCK TO SILL BEAM", 
                "4. FROM SILL BEAM TO START ADJUSTING ON TARGET ROW", 
                "5. FROM START ADJUSTING ON TARGET ROW TO UNLOCK", 
                "6. FROM UNLOCK TO SILL BEAM"
            ],
            DISCHARGE: [
                "1. FROM PARK TO SILL BEAM TO START TARGET ROW", 
                "2. FROM START ADJUSTING ON CONTAINER TO LOCK", 
                "3. FROM LOCK TO SILL BEAM", 
                "4. FROM SILL BEAM TO START ADJUSTING ON TRUCK", 
                "5. FROM START ADJUSTING ON TRUCK TO UNLOCK ON TRUCK", 
                "6. FROM UNLOCK TRUCK TO SILL BEAM/PARK POSITION"
            ]
        },
        RTG: {
            LOADING: [
                "1. FROM PARK POSITION TO LOCK CONTAINER IN THE BAY", 
                "2. FROM LOCK IN THE BAY TO A-ROW", 
                "3. FROM A- ROW TO UNLOCK ON TRUCK", 
                "4. FROM UNLOCK ON TRUCK TO PARK POSITION"
            ],
            DISCHARGE: [
                "1. FROM PARK POSITION TO LOCK ON TRUCK", 
                "2. FROM LOCK ON TRUCK TO UNLOCK ON TARGET ROW", 
                "3. FROM UNLOCK TO PARK POSITION"
            ]
        },
        TT: {
            LOADING: {
                steps: ["1. Container lifted by QC", "2. Move to yard RTG location", "3. Received container from RTG", "4. Move to PULL position", "5. Move to pinning area", "6. Fixing twistlock", "7. Move to standby position", "8. Move to under crane"],
                optional: [4, 5, 6, 7]
            },
            DISCHARGE: {
                steps: ["1. Received container from QC", "2. Move to pinning station", "3. Twistlocks removed", "4. Move to RTG", "5. Containers discharged", "6. Move to PULL position", "7. Move to standby position", "8. Move to under crane"],
                optional: [2, 3, 6, 7]
            }
        },
        MHC_LOOSE: {
            LOADING: ["Step 1: Grab touch cargo to grab close", "Step 2: Hoist up to reach unload position", "Step 3: Start open cargo to full unload", "Step 4: Hoist empty grab to grab touch cargo"],
            DISCHARGE: ["Step 1: Grab touch cargo on vessel to grab close", "Step 2: Hoist up to reach unload position", "Step 3: Start open cargo to full unload", "Step 4: Hoist empty grab to grab touch cargo on vessel"]
        },
        BAGGED_CARGO: {
            LOADING: ["Step 1: Connect sling to hoist up", "Step 2: Move cargo to till touch the target area", "Step 3: Disconnect the sling to hoist up", "Step 4: Move empty hook to the quayside ground"],
            DISCHARGE: ["Step 1: Connect sling to hoist up", "Step 2: Move cargo to till touch the target area", "Step 3: Disconnect the sling to hoist up", "Step 4: Move empty hook to the vessel target location"]
        },
        DEFAULT: {
            LOADING: ["1. Start operation", "2. In progress", "3. Completion"],
            DISCHARGE: ["1. Start operation", "2. In progress", "3. Completion"]
        }
    };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id.includes('ops') || id === 'mr-screen') parentScreen = id;
    }

    function startTimer(equipment) {
        currentCrane = equipment;
        currentMode = 'LOADING';
        
        const inputDiv = document.getElementById('input-container');
        if (equipment === 'QC') {
            inputDiv.className = 'id-inputs-qc';
            inputDiv.innerHTML = `
                <input type="text" id="staffId" placeholder="STAFF ID">
                <input type="text" id="unitNo" class="qc-no-box" placeholder="QC#" maxlength="2">
                <select id="category" onchange="renderSteps()">
                    <option value="Above deck">Above deck</option>
                    <option value="Below deck">Below deck</option>
                    <option value="Hatch cover">Hatch cover</option>
                    <option value="OOG (OHF)">OOG (OHF)</option>
                    <option value="OOG (Wire Sling)">OOG (Wire Sling)</option>
                    <option value="RORO">RORO</option>
                </select>
            `;
        } else if (equipment === 'TT') {
            inputDiv.className = 'id-inputs-tt';
            inputDiv.innerHTML = `
                <input type="text" id="staffId" placeholder="STAFF ID">
                <input type="text" id="unitNo" class="qc-no-box" placeholder="TT#" maxlength="3">
                <select id="ttFilter">
                    <option value="Single">Single</option>
                    <option value="Dual">Dual</option>
                </select>
            `;
        } else if (equipment === 'MHC_LOOSE') {
            inputDiv.className = 'id-inputs-gct';
            inputDiv.innerHTML = `
                <input type="text" id="staffId" placeholder="STAFF ID" maxlength="4">
                <input type="text" id="unitNo" class="qc-no-box" placeholder="MHC#" maxlength="2">
                <select id="category" onchange="renderSteps()">
                    <option value="LHM">LHM</option>
                    <option value="GOTWALD">GOTWALD</option>
                    <option value="SHIPCRANE">SHIPCRANE</option>
                </select>
            `;
        } else if (equipment === 'BAGGED_CARGO') {
            inputDiv.className = 'id-inputs-gct';
            inputDiv.innerHTML = `
                <input type="text" id="staffId" placeholder="STAFF ID" maxlength="4">
                <input type="text" id="unitNo" class="qc-no-box" placeholder="CRANE#" maxlength="2">
                <select id="category" onchange="renderSteps()">
                    <option value="KATO">KATO</option>
                    <option value="SHIP CRANE">SHIP CRANE</option>
                    <option value="LHM">LHM</option>
                </select>
                <select id="cargoType" class="full-width-input" onchange="renderSteps()">
                    <option value="Jumbo Bag">Jumbo Bag</option>
                    <option value="cement">cement</option>
                    <option value="Dhow">Dhow</option>
                    <option value="steel pipe">steel pipe</option>
                    <option value="steel rod">steel rod</option>
                </select>
            `;
        } else {
            inputDiv.className = 'id-inputs-generic';
            inputDiv.innerHTML = `
                <input type="text" id="staffId" placeholder="STAFF ID">
                <input type="text" id="unitNo" placeholder="${equipment} NO.">
            `;
        }

        const toggle = document.querySelector('.mode-toggle');
        toggle.style.display = (equipment === 'M&R') ? 'none' : 'flex';
        const card = document.getElementById('timer-card');
        card.style.borderTopColor = (parentScreen === 'gct-ops-screen') ? 'var(--ct-blue)' : 'var(--orange)';

        document.getElementById('timer-back-btn').onclick = () => {
            if (startTime) { if (!confirm("Stop current timer and go back?")) return; resetCrane(); }
            showScreen(parentScreen);
        };
        document.getElementById('dl-report-btn').onclick = () => downloadReport(equipment);
        document.getElementById('m-load').className = 'mode-btn active';
        document.getElementById('m-dis').className = 'mode-btn';
        resetCrane();
        showScreen('timer-screen');
    }

    function updateMode(mode) {
        if (startTime) return;
        currentMode = mode;
        document.getElementById('m-load').className = mode === 'LOADING' ? 'mode-btn active' : 'mode-btn';
        document.getElementById('m-dis').className = mode === 'DISCHARGE' ? 'mode-btn active' : 'mode-btn';
        renderSteps();
    }

    function renderSteps() {
        const container = document.getElementById('step-btns');
        container.innerHTML = '';
        let steps = [];
        if (currentCrane === 'QC') {
            steps = currentMode === 'LOADING' ? config.QC.LOADING : config.QC.DISCHARGE;
        } else if (currentCrane === 'RTG') {
            steps = currentMode === 'LOADING' ? config.RTG.LOADING : config.RTG.DISCHARGE;
        } else if (currentCrane === 'TT') {
            steps = config.TT[currentMode === 'LOADING' ? 'LOADING' : 'DISCHARGE'].steps;
        } else if (currentCrane === 'MHC_LOOSE') {
            steps = config.MHC_LOOSE[currentMode === 'LOADING' ? 'LOADING' : 'DISCHARGE'];
        } else if (currentCrane === 'BAGGED_CARGO') {
            steps = config.BAGGED_CARGO[currentMode === 'LOADING' ? 'LOADING' : 'DISCHARGE'];
        } else {
            steps = config[currentCrane] ? config[currentCrane][currentMode] : config.DEFAULT[currentMode];
        }
        
        steps.forEach((text, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn-step';
            btn.disabled = i !== 0;
            btn.id = `s${i+1}`;
            btn.innerText = text;
            btn.style.background = (parentScreen === 'gct-ops-screen') ? 'var(--ct-blue)' : 'var(--orange)';
            btn.onclick = () => triggerStep(i + 1);
            container.appendChild(btn);
        });
    }

    function triggerStep(stepNum) {
        const now = Date.now();
        let steps = [];
        let optional = [];
        
        if (currentCrane === 'QC') {
            steps = currentMode === 'LOADING' ? config.QC.LOADING : config.QC.DISCHARGE;
        } else if (currentCrane === 'RTG') {
            steps = currentMode === 'LOADING' ? config.RTG.LOADING : config.RTG.DISCHARGE;
        } else if (currentCrane === 'TT') {
            const ttCfg = config.TT[currentMode === 'LOADING' ? 'LOADING' : 'DISCHARGE'];
            steps = ttCfg.steps;
            optional = ttCfg.optional;
        } else if (currentCrane === 'MHC_LOOSE') {
            steps = config.MHC_LOOSE[currentMode === 'LOADING' ? 'LOADING' : 'DISCHARGE'];
        } else if (currentCrane === 'BAGGED_CARGO') {
            steps = config.BAGGED_CARGO[currentMode === 'LOADING' ? 'LOADING' : 'DISCHARGE'];
        } else {
            steps = config[currentCrane] ? config[currentCrane][currentMode] : config.DEFAULT[currentMode];
        }

        if (navigator.vibrate) navigator.vibrate(40);

        if (stepNum === 1) {
            startTime = now;
            absoluteStartTime = now;
            totalWaitingDuration = 0;
            currentCycleData = { 
                Date: new Date().toLocaleDateString(), Time: new Date().toLocaleTimeString(),
                Equipment: currentCrane.replace('_', ' '), Unit_No: document.getElementById('unitNo').value || "N/A", 
                Staff_ID: document.getElementById('staffId').value || "N/A", 
                Category: (document.getElementById('category')) ? document.getElementById('category').value : (document.getElementById('ttFilter') ? document.getElementById('ttFilter').value : "N/A"),
                Cargo_Type: (document.getElementById('cargoType')) ? document.getElementById('cargoType').value : "N/A",
                Operation: currentMode 
            };
            document.getElementById('pause-btn').disabled = false;
            document.getElementById('wait-btn').disabled = false;
            activeInterval = setInterval(() => { document.getElementById('main-timer').innerText = ((Date.now() - startTime)/1000).toFixed(2); }, 50);
        } else {
            currentCycleData['Step_'+(stepNum-1)] = ((now - lastTime) / 1000).toFixed(2);
        }

        for(let i=1; i<=steps.length; i++) {
            const btn = document.getElementById(`s${i}`);
            btn.disabled = true;
            btn.classList.remove('step-active');
        }
        document.getElementById(`s${stepNum}`).classList.add('step-active');

        if (stepNum === steps.length) {
            clearInterval(activeInterval);
            currentCycleData['Step_'+stepNum] = ((now - lastTime) / 1000).toFixed(2);
            const finishTime = now;
            currentCycleData['Net_Cycle_Time'] = ((finishTime - startTime) / 1000).toFixed(2);
            currentCycleData['Gross_Cycle_Time'] = ((finishTime - absoluteStartTime) / 1000).toFixed(2);
            currentCycleData['Waiting_Time'] = (totalWaitingDuration / 1000).toFixed(2);
            
            masterLogs.push({...currentCycleData});
            if (!currentCounts[currentCrane]) currentCounts[currentCrane] = 0;
            currentCounts[currentCrane]++;
            document.getElementById('cycle-count').innerText = currentCounts[currentCrane];
            document.getElementById('pause-btn').disabled = true;
            document.getElementById('wait-btn').disabled = true;
            setTimeout(resetCrane, 1500);
        } else {
            let nextStep = stepNum + 1;
            document.getElementById(`s${nextStep}`).disabled = false;
            if (optional.includes(nextStep)) {
                let firstMandatory = steps.length;
                for (let j = nextStep; j <= steps.length; j++) {
                    if (!optional.includes(j)) { firstMandatory = j; break; }
                    else { document.getElementById(`s${j}`).disabled = false; }
                }
                document.getElementById(`s${firstMandatory}`).disabled = false;
            }
        }
        lastTime = now;
    }

    function togglePause() {
        if (isWaiting) toggleWaiting(); 
        const btn = document.getElementById('pause-btn');
        const now = Date.now();
        if (!isPaused) {
            isPaused = true; delayStart = now; btn.classList.add('pause-on'); clearInterval(activeInterval);
        } else {
            isPaused = false; 
            let diff = (now - delayStart); 
            startTime += diff; lastTime += diff; 
            btn.classList.remove('pause-on');
            activeInterval = setInterval(() => { document.getElementById('main-timer').innerText = ((Date.now() - startTime)/1000).toFixed(2); }, 50);
        }
    }

    function toggleWaiting() {
        if (isPaused) togglePause(); 
        const btn = document.getElementById('wait-btn');
        const now = Date.now();
        if (!isWaiting) {
            isWaiting = true; delayStart = now; btn.classList.add('wait-on'); clearInterval(activeInterval);
        } else {
            isWaiting = false; 
            let diff = (now - delayStart); 
            totalWaitingDuration += diff;
            startTime += diff; lastTime += diff; 
            btn.classList.remove('wait-on');
            activeInterval = setInterval(() => { document.getElementById('main-timer').innerText = ((Date.now() - startTime)/1000).toFixed(2); }, 50);
        }
    }

    function resetCurrentTimer() { if(confirm("Discard current measurement?")) resetCrane(); }

    function resetCrane() {
        clearInterval(activeInterval); startTime = null; absoluteStartTime = null; isPaused = false; isWaiting = false; totalWaitingDuration = 0;
        document.getElementById('main-timer').innerText = "0.00";
        document.getElementById('pause-btn').disabled = true;
        document.getElementById('wait-btn').disabled = true;
        document.getElementById('pause-btn').classList.remove('pause-on');
        document.getElementById('wait-btn').classList.remove('wait-on');
        document.getElementById('cycle-count').innerText = currentCounts[currentCrane] || 0;
        renderSteps();
    }

    function calculateAverage(arr) {
        if (arr.length === 0) return "0.00";
        return (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(2);
    }

    function calculateMedian(arr) {
        if (arr.length === 0) return "0.00";
        const sorted = [...arr].sort((a, b) => a - b);
        const mid = Math.floor(sorted.length / 2);
        return (sorted.length % 2 !== 0 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2).toFixed(2);
    }

    function downloadReport(equipment) {
        const filtered = masterLogs.filter(log => log.Equipment.replace(' ', '_') === equipment.replace(' ', '_'));
        if (filtered.length === 0) return alert("No recorded cycles found.");
        
        // Define metadata headers
        const metaHeaders = ['Date', 'Time', 'Equipment', 'Unit_No', 'Staff_ID', 'Category', 'Cargo_Type', 'Operation'];
        
        // Find maximum steps to create consistent headers
        let maxSteps = 0;
        filtered.forEach(log => {
            const steps = Object.keys(log).filter(k => k.startsWith('Step_')).length;
            if (steps > maxSteps) maxSteps = steps;
        });
        const stepHeaders = Array.from({length: maxSteps}, (_, i) => `Step_${i+1}`);
        const metricHeaders = ['Net_Cycle_Time', 'Gross_Cycle_Time', 'Waiting_Time'];
        const allHeaders = [...metaHeaders, ...stepHeaders, ...metricHeaders];

        // Create CSV Content (Most mobile compatible format)
        let csvRows = [];
        
        // Header Row
        csvRows.push(allHeaders.map(h => `"${h.replace(/_/g, ' ')}"`).join(','));

        // Data Rows
        filtered.forEach(row => {
            let values = allHeaders.map(h => `"${row[h] !== undefined ? row[h] : ''}"`);
            csvRows.push(values.join(','));
        });

        // Add 2 blank lines for spacing before summary
        csvRows.push("");
        csvRows.push("");

        // Summary Analytics Section
        const netValues = filtered.map(log => parseFloat(log.Net_Cycle_Time)).filter(v => !isNaN(v));
        const grossValues = filtered.map(log => parseFloat(log.Gross_Cycle_Time)).filter(v => !isNaN(v));
        const waitValues = filtered.map(log => parseFloat(log.Waiting_Time)).filter(v => !isNaN(v));

        csvRows.push(",,,,,,Metric,Net Cycle Time,Gross Cycle Time,Waiting Time");
        csvRows.push(`,,,,,,Average,${calculateAverage(netValues)},${calculateAverage(grossValues)},${calculateAverage(waitValues)}`);
        csvRows.push(`,,,,,,Median,${calculateMedian(netValues)},${calculateMedian(grossValues)},${calculateMedian(waitValues)}`);

        const csvString = csvRows.join('\n');

        // Use UTF-8 BOM to ensure mobile office apps recognize characters correctly
        const blob = new Blob(['\ufeff', csvString], { type: "text/csv;charset=utf-8" });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        
        link.href = url;
        link.download = `${equipment}_Cycle_Report_${new Date().toISOString().slice(0,10)}.csv`;
        
        // Mobile browsers require appending to document
        document.body.appendChild(link);
        link.click();
        
        // Cleanup
        setTimeout(() => {
            document.body.removeChild(link);
            window.URL.revokeObjectURL(url);
        }, 100);
    }
</script>

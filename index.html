<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Timer Master</title>
    <!-- Note: These CDNs require an initial internet connection to load the app -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --calc-bg: #121212; 
            --calc-btn: #333333; 
            --calc-btn-active: #ff9800; 
            --calc-lcd: #9ea78d; 
            --calc-lcd-text: #1a1c1a; 
            --calc-red: #b91c1c; 
            --calc-blue: #2563eb; 
            --calc-teal: #0f766e; 
        }
        
        body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; background: var(--calc-bg); margin: 0; padding: 0; display: flex; justify-content: center; position: relative; min-height: 100vh; color: #ffffff; }
        
        .screen { width: 100%; max-width: 500px; min-height: 100vh; background: #1e1e1e; display: none; padding: 24px; box-sizing: border-box; position: relative; border-left: 1px solid #2a2a2a; border-right: 1px solid #2a2a2a; }
        .active { display: block; }

        .btn-calc {
            background-color: var(--calc-btn);
            border-radius: 14px;
            box-shadow: 
                inset 0 1px 0 rgba(255,255,255,0.1),
                0 4px 0 #000,
                0 6px 10px rgba(0,0,0,0.5);
            color: #ffffff;
            font-weight: 800;
            text-transform: uppercase;
            transition: all 0.05s;
            position: relative;
            top: 0;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .btn-calc:active:not(:disabled) {
            top: 3px;
            box-shadow: 
                inset 0 1px 2px rgba(0,0,0,0.5),
                0 1px 0 #000,
                0 2px 4px rgba(0,0,0,0.3);
        }

        .menu-card { 
            padding: 24px; font-size: 1.25rem; letter-spacing: 0.05em; margin-bottom: 20px;
            width: 100%;
        }
        
        .btn-step { 
            height: 85px; font-size: 0.72rem; padding: 8px; line-height: 1.2; 
        }
        .step-available { background-color: #333 !important; } 
        .step-active { 
            background-color: var(--calc-btn-active) !important; 
            color: #000 !important; 
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.5), 0 4px 0 #b36b00, 0 8px 12px rgba(0,0,0,0.5);
        } 
        
        .btn-calc:disabled { opacity: 0.25; cursor: not-allowed; box-shadow: none; top: 0; filter: grayscale(100%); }

        .equip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .equip-item { padding: 24px 12px; font-size: 1.1rem; }

        .timer-container { 
            background-color: var(--calc-lcd); 
            border-radius: 12px; 
            padding: 12px 18px; 
            position: relative; 
            width: 100%; 
            margin-bottom: 18px; 
            border: 4px solid #000;
            box-shadow: 
                inset 0 10px 20px rgba(0,0,0,0.3),
                0 2px 0 rgba(255,255,255,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .lcd-sub-section {
            border-bottom: 1px solid rgba(0,0,0,0.15);
            padding-bottom: 4px;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .lcd-label {
            font-size: 0.6rem;
            font-weight: 900;
            color: rgba(0,0,0,0.5);
            text-transform: uppercase;
        }

        #last-cycle-display {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-weight: 900;
            color: rgba(26, 28, 26, 0.6);
            font-size: 1.5rem;
            text-align: right;
        }

        #main-timer { 
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-weight: 900; 
            color: var(--calc-lcd-text); 
            text-align: right; 
            line-height: 1; 
            font-size: 3.8rem; 
        }

        .dark-input { border: 2px solid #333; padding: 14px; border-radius: 10px; width: 100%; font-weight: 700; outline: none; background: #121212; color: #fff; }
        .dark-input:focus { border-color: var(--calc-btn-active); }
        .setup-label { font-size: 0.7rem; font-weight: 900; text-transform: uppercase; color: #666; margin-bottom: 6px; display: block; }

        #toast { 
            position: fixed; 
            bottom: 40px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: #ffffff; 
            color: #000000; 
            padding: 12px 24px; 
            border-radius: 12px; 
            font-weight: 900; 
            font-size: 0.8rem;
            text-transform: uppercase;
            z-index: 9999; 
            display: none;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); 
            border: 3px solid #000;
            pointer-events: none;
        }
        
        #custom-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        #custom-modal { background: #222; padding: 32px; border-radius: 24px; max-width: 360px; text-align: center; border: 2px solid #333; color: white; }
    
        .mode-active { background-color: white !important; color: black !important; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3) !important; }

        .admin-only { display: none !important; }
        .logged-in .admin-only { display: block !important; }
        
        .btn-red { background-color: var(--calc-red) !important; box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 4px 0 #600, 0 8px 15px rgba(0,0,0,0.4); }
        .btn-blue { background-color: var(--calc-blue) !important; box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 4px 0 #1e3a8a, 0 8px 15px rgba(0,0,0,0.4); }

        .status-badge {
            font-size: 0.5rem;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .status-online { background: #059669; color: white; }
        .status-offline { background: #dc2626; color: white; }
    </style>
</head>
<body id="app-body">

    <div id="custom-modal-overlay">
        <div id="custom-modal">
            <h3 id="modal-title" class="text-2xl font-black uppercase mb-3">Confirm Action</h3>
            <p id="modal-msg" class="text-slate-400 font-bold mb-10">Select action to proceed with system update.</p>
            <div class="flex gap-4">
                <button class="btn-calc flex-1 py-5 text-xs" onclick="closeModal()">CANCEL</button>
                <button class="btn-calc btn-red flex-1 py-5 text-xs" id="modal-confirm-btn">EXECUTE</button>
            </div>
        </div>
    </div>
    
    <div id="toast"></div>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="screen">
        <button class="btn-calc px-6 py-4 text-xs mb-16" onclick="showScreen('home-screen')">
            <i class="fas fa-chevron-left mr-2"></i> RETURN
        </button>
        <div class="text-center mb-12">
            <h2 class="text-4xl font-black uppercase tracking-tight">SECURE PIN</h2>
        </div>
        <div class="space-y-8">
            <input type="password" id="adminPin" placeholder="••••" class="dark-input text-center text-4xl tracking-[20px]">
            <button onclick="attemptLogin()" class="btn-calc w-full py-7 text-sm tracking-[0.3em]">
                AUTHORIZE
            </button>
        </div>
    </div>

    <!-- HOME SCREEN -->
    <div id="home-screen" class="screen active">
        <div class="flex justify-between items-start mt-4 mb-12">
             <div class="text-left">
                <div class="flex items-center gap-3 mb-1">
                    <h1 class="text-5xl font-black tracking-tighter leading-none italic uppercase">Cycle <span class="text-orange-500">Timer</span></h1>
                    <span id="conn-status" class="status-badge status-online">Online</span>
                </div>
                <p class="text-slate-500 font-black uppercase tracking-[0.2em] text-[10px] mt-2">CYCLE TIME RECORDER</p>
            </div>
            <div class="flex gap-4">
                <button id="login-btn" onclick="showScreen('login-screen')" class="btn-calc w-16 h-16">
                    <i class="fas fa-lock text-xl"></i>
                </button>
                <button id="logout-btn" onclick="logout()" class="admin-only btn-calc btn-red w-16 h-16 hidden">
                    <i class="fas fa-power-off text-xl"></i>
                </button>
            </div>
        </div>

        <div class="flex flex-col gap-6">
            <button class="btn-calc menu-card" style="background-color: var(--calc-btn-active); color: #000;" onclick="showScreen('ct-ops-screen')">
                <span>CT OPS</span>
                <i class="fa-solid fa-ship text-3xl"></i>
            </button>
            <button class="btn-calc menu-card" style="background-color: var(--calc-blue);" onclick="showScreen('gct-ops-screen')">
                <span>GCT OPS</span>
                <i class="fa-solid fa-boxes-stacked text-3xl"></i>
            </button>
            <button class="btn-calc menu-card" style="background-color: var(--calc-teal);" onclick="showScreen('mr-screen')">
                <span>M&R LOGS</span>
                <i class="fa-solid fa-screwdriver-wrench text-3xl"></i>
            </button>
            <button class="btn-calc menu-card" onclick="openQuickManual()">
                <span>MANUAL SETUP</span>
                <i class="fa-solid fa-keyboard text-3xl"></i>
            </button>
        </div>

        <div class="mt-20 pt-8 border-t border-white/5">
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest text-center leading-relaxed">
                Developed By:<br>
                <span class="text-white text-xs">Mr. Golden Micheal</span><br>
                <span class="opacity-50 italic lowercase">Port of Salalah</span>
            </p>
        </div>
    </div>

    <!-- MANUAL SETUP SCREEN -->
    <div id="manual-setup-screen" class="screen">
        <div class="flex justify-between items-center mb-10">
            <button class="btn-calc px-5 py-4 text-xs" onclick="showScreen(window.parentScreen)">
                <i class="fas fa-chevron-left"></i> BACK
            </button>
            <div id="auth-status-container">
                <button id="google-login-btn" onclick="loginWithGoogle()" class="btn-calc px-5 py-3 text-[11px]">
                    <i class="fab fa-google text-red-500 mr-2"></i> CLOUD SYNC
                </button>
            </div>
        </div>

        <div class="space-y-6">
            <h2 id="setup-title" class="text-2xl font-black uppercase tracking-tight">Configuration</h2>
            <div>
                <label class="setup-label">Asset Identifier</label>
                <input type="text" id="manualEquipId" placeholder="e.g. CRANE-05" class="dark-input">
            </div>
            <div id="staff-id-group">
                <label class="setup-label">Operator ID</label>
                <input type="text" id="manualStaffId" placeholder="STAFF-ID" class="dark-input">
            </div>
            <div class="bg-white/5 p-6 rounded-2xl border border-white/5">
                <label class="setup-label">Sequence Steps</label>
                <div class="flex gap-2">
                    <input type="text" id="manualStepInput" placeholder="Action..." class="dark-input">
                    <button onclick="addManualStep()" class="btn-calc btn-blue px-4 text-[11px]">ADD</button>
                </div>
                <div id="manualStepList" class="space-y-3 mt-6 max-h-[250px] overflow-y-auto pr-2"></div>
            </div>
            <button id="run-once-btn" onclick="openManualTimer()" class="btn-calc w-full py-6 text-sm tracking-widest">
                START MEASUREMENT
            </button>
        </div>
    </div>

    <!-- TIMER SCREEN -->
    <div id="timer-screen" class="screen">
        <div class="flex justify-between items-center mb-6">
            <button id="timer-home-btn" onclick="goHome()" class="btn-calc px-5 py-3 text-[11px]">
                <i class="fas fa-times-circle mr-2"></i> EXIT
            </button>
            <div id="dateDisplay" class="text-[11px] font-black opacity-30 uppercase tracking-[0.3em]"></div>
        </div>

        <div id="standard-inputs" class="mb-4">
            <div class="mode-toggle flex gap-4 mb-4" id="modeToggleContainer">
                <button id="m-load" class="btn-calc flex-1 py-5 text-sm mode-active" onclick="updateMode('LOADING')">LOADING</button>
                <button id="m-dis" class="btn-calc flex-1 py-5 text-sm opacity-30" onclick="updateMode('DISCHARGE')">DISCHARGE</button>
            </div>
            <div id="dynamic-inputs" class="space-y-3"></div>
        </div>

        <div class="timer-container">
            <div class="lcd-sub-section">
                <span class="lcd-label">LAST CYCLE</span>
                <span id="last-cycle-display">0.00</span>
            </div>
            <div class="flex justify-between items-end">
                <span class="lcd-label mb-1">CURRENT</span>
                <div id="main-timer">0.00</div>
            </div>
            <div class="absolute top-1 left-2 text-slate-800 font-black text-[0.45rem] uppercase opacity-40">
                TOTAL CYCLES: <span id="cycle-count">0</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <button id="pause-btn" onclick="togglePause()" class="btn-calc py-6 text-xs" style="background-color: #f59e0b;">PAUSE</button>
            <button id="wait-btn" onclick="toggleWaiting()" class="btn-calc py-6 text-xs" style="background-color: #0ea5e9;">WAITING</button>
        </div>

        <div id="step-grid" class="grid grid-cols-2 gap-4 pt-2"></div>

        <button id="stop-cycle-btn" onclick="stopCycle()" class="btn-calc btn-red w-full py-8 text-2xl tracking-[0.2em] mt-8 hidden">
            STOP & LOG
        </button>

        <div class="flex flex-col gap-4 mt-12 mb-10">
            <button onclick="downloadReport()" class="btn-calc w-full py-6 text-sm tracking-widest">
                <i class="fas fa-file-export mr-3"></i> EXPORT CSV REPORT
            </button>
            <button onclick="clearLocalStorage()" class="text-[10px] font-black text-red-500 uppercase tracking-widest opacity-40 hover:opacity-100 transition">
                Clear Offline Storage
            </button>
        </div>
    </div>

    <!-- SUCCESS MODAL -->
    <div id="recordModal" class="fixed inset-0 flex items-center justify-center bg-black/95 backdrop-blur-md z-50 hidden">
        <div class="bg-white p-14 rounded-[3rem] shadow-2xl text-center mx-4 w-full max-w-[320px]">
            <div class="w-16 h-16 bg-green-500 text-white rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-check text-3xl"></i>
            </div>
            <h2 class="text-3xl font-black text-black uppercase tracking-tighter">LOGGED</h2>
        </div>
    </div>

    <!-- OPS SCREENS -->
    <div id="ct-ops-screen" class="screen">
        <button class="btn-calc px-5 py-4 text-xs mb-10" onclick="showScreen('home-screen')">BACK</button>
        <h2 class="text-3xl font-black uppercase mb-8">CT ASSETS</h2>
        <div class="equip-grid" id="ct-grid"></div>
    </div>
    <div id="gct-ops-screen" class="screen">
        <button class="btn-calc px-5 py-4 text-xs mb-10" onclick="showScreen('home-screen')">BACK</button>
        <h2 class="text-3xl font-black uppercase mb-8">GCT ASSETS</h2>
        <div class="equip-grid" id="gct-grid"></div>
    </div>
    <div id="mr-screen" class="screen">
        <button class="btn-calc px-5 py-4 text-xs mb-10" onclick="showScreen('home-screen')">BACK</button>
        <h2 class="text-3xl font-black uppercase mb-8">M&R LOGS</h2>
        <div class="equip-grid" id="mr-grid"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDocs, onSnapshot, query, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    function showToast(msg) {
        const t = document.getElementById('toast');
        if (t) { t.innerText = msg; t.style.display = 'block'; setTimeout(() => { t.style.display = 'none'; }, 2500); }
    }
    window.showToast = showToast;

    // LOCAL STORAGE KEYS
    const LOGS_STORAGE_KEY = 'cycle_timer_offline_logs';

    let firebaseConfig = null;
    try { if (typeof __firebase_config !== 'undefined' && __firebase_config) firebaseConfig = JSON.parse(__firebase_config); } catch (e) {}
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    let app, auth, db;
    if (firebaseConfig && firebaseConfig.apiKey) { 
        app = initializeApp(firebaseConfig); 
        auth = getAuth(app); 
        db = getFirestore(app); 
        
        // Attempt to enable Firebase Offline Persistence if online
        try {
            enableIndexedDbPersistence(db).catch((err) => {
                if (err.code == 'failed-precondition') {
                    console.warn("Offline persistence failed (multiple tabs open)");
                } else if (err.code == 'unimplemented') {
                    console.warn("Offline persistence not supported by browser");
                }
            });
        } catch(e) {}
    }

    // STATE
    let logs = [];
    let currentCrane = '';
    let currentMode = 'LOADING';
    let currentCategory = 'Above Deck';
    let currentSteps = [];
    let cycleCount = 0;
    let activeInterval = null;
    let startTime = null;     
    let lastTime = null;
    let isPaused = false;
    let isWaiting = false;
    let totalWaitingDuration = 0; 
    let delayStart = null;
    let currentCycleData = {};

    const standardSteps = {
        LOADING: [
            "1. FROM PARK POSITION TO ADJUST ON TRUCK",
            "2. FROM START ADJUSTING ON TRUCK TO LOCK THE CONTAINER ON TRUCK",
            "3. FROM LOCK ON CONTAINER ON TRUCK TO SILL BEAM",
            "4. FROM SILL BEAM TO START ADJUSTING ON TARGET ROW",
            "5. FROM START ADJUSTING ON TARGET ROW TO UNLOCK",
            "6. FROM UNLOCK TO SILL BEAM"
        ],
        DISCHARGE: [
            "1. FROM PARK TO SILL BEAM TO START TARGET ROW",
            "2. FROM START ADJUSTING ON CONTAINER TO LOCK",
            "3. FROM LOCK TO SILL BEAM",
            "4. FROM SILL BEAM TO START ADJUSTING ON TRUCK",
            "5. FROM START ADJUSTING ON TRUCK TO UNLOCK ON TRUCK",
            "6. FROM UNLOCK TRUCK TO SILL BEAM/PARK POSITION"
        ]
    };

    const config = {
        QC: {
            "Above Deck": standardSteps,
            "Below Deck": standardSteps,
            "Hatch cover": {
                LOADING: [
                    "1. From Park position Or Sillbeam TO Adjustment on Hatch cover",
                    "2. From start Adjusting to lock",
                    "3. From lock on Hatch cover to sillbeam",
                    "4. From sillbeam to start adjust on target row",
                    "5. From Start adjust on target row to Unlock",
                    "6. From Unlock to sillbeam"
                ],
                DISCHARGE: [
                    "1. From Park position / Sillbeam to target hatch cover location",
                    "2. From Start adjust on hatch cover to Lock",
                    "3. From Lock to sillbeam",
                    "4. From Sillbeam to start Aligning on back reach",
                    "5. From start Aligning on back reach to Unlock",
                    "6. From Unlock to sillbeam / Park position"
                ]
            },
            "OOG (OHF)": {
                LOADING: [
                    "1. From Park position Or Sillbeam TO Adjustment on TT",
                    "2. From start Adjusting to lock",
                    "3. From lock on OOG to sillbeam",
                    "4. From sillbeam to start adjust on target row",
                    "5. From Start adjust on target row to Unlock",
                    "6. From Unlock to sillbeam"
                ],
                DISCHARGE: [
                    "1. From Park position / Sillbeam to target OOG",
                    "2. From Start adjust on OOG to Lock",
                    "3. From Lock to sillbeam",
                    "4. From Sillbeam to start Adjusting on TT",
                    "5. From start Adjustment on TT to Unlock",
                    "6. From Unlock to sillbeam / Park position"
                ]
            },
            "OOG (Wire sling)": {
                DISCHARGE: [
                    "1. From Park position / Sillbeam to target OOG",
                    "2. From Start adjust on OOG to Awaiting attachements",
                    "3. From Awaiting attachements by dowelman to clearance to hoist"
                ],
                LOADING: [
                    "1. Hook up OOG",
                    "2. Lift OOG",
                    "3. Release OOG"
                ]
            }
        },
        RTG: {
            LOADING: [
                "1. FROM PARK POSITION TO LOCK CONTAINER IN THE BAY",
                "2. FROM LOCK IN THE BAY TO A-ROW",
                "3. FROM A- ROW TO UNLOCK ON TRUCK",
                "4. FROM UNLOCK ON TRUCK TO PARK POSITION"
            ],
            DISCHARGE: [
                "1. FROM PARK POSITION TO LOCK ON TRUCK",
                "2. FROM LOCK ON TRUCK TO UNLOCK ON TARGET ROW",
                "3. FROM UNLOCK TO PARK POSITION"
            ]
        },
        TT: {
            LOADING: ["1. Lifted by QC", "2. Move to RTG", "3. Rec from RTG", "4. Move to PULL", "5. Move to Pinning", "6. Fixing twistlock", "7. Standby"],
            DISCHARGE: ["1. Rec from QC", "2. Move to Pinning", "3. Twistlocks out", "4. Move to RTG", "5. Discharged", "6. Move to PULL", "7. Standby"]
        },
        DEFAULT: ["1. Start cycle", "2. End cycle"]
    };

    // OFFLINE LOGIC
    function saveLogsToLocal() {
        localStorage.setItem(LOGS_STORAGE_KEY, JSON.stringify(logs));
    }

    function loadLogsFromLocal() {
        const saved = localStorage.getItem(LOGS_STORAGE_KEY);
        if (saved) {
            logs = JSON.parse(saved);
            cycleCount = logs.length;
            document.getElementById('cycle-count').innerText = cycleCount;
            if (cycleCount > 0) {
                document.getElementById('last-cycle-display').innerText = logs[logs.length-1].Net_Cycle || "0.00";
            }
        }
    }

    window.clearLocalStorage = () => {
        openModal("CLEAR STORAGE?", "This will erase all logs currently stored on this device. Make sure you have exported your CSV first.", () => {
            localStorage.removeItem(LOGS_STORAGE_KEY);
            logs = [];
            cycleCount = 0;
            document.getElementById('cycle-count').innerText = "0";
            document.getElementById('last-cycle-display').innerText = "0.00";
            showToast("STORAGE CLEARED");
        });
    };

    // CONNECTION MONITOR
    window.addEventListener('online', updateConnStatus);
    window.addEventListener('offline', updateConnStatus);
    function updateConnStatus() {
        const badge = document.getElementById('conn-status');
        if (navigator.onLine) {
            badge.innerText = "Online";
            badge.className = "status-badge status-online";
        } else {
            badge.innerText = "Offline Mode";
            badge.className = "status-badge status-offline";
        }
    }

    if (auth) signInAnonymously(auth);

    window.showScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id.includes('ops') || id === 'mr-screen') { window.parentScreen = id; renderEquipmentGrid(id); }
        document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    };

    function renderEquipmentGrid(screenId) {
        const grid = document.getElementById(screenId === 'ct-ops-screen' ? 'ct-grid' : screenId === 'gct-ops-screen' ? 'gct-grid' : 'mr-grid');
        if (!grid) return; grid.innerHTML = '';
        const items = (screenId === 'ct-ops-screen' ? ['QC', 'RTG', 'TT', 'EH', 'RS', 'FLT', 'LASHER', 'DOWELMAN'] : screenId === 'gct-ops-screen' ? ['MHC_LOOSE', 'LASHER', 'BAGGED_CARGO', 'FLT', 'RTG', 'RS'] : ['M&R']);
        items.forEach(name => {
            const btn = document.createElement('button'); btn.className = 'btn-calc equip-item'; btn.innerText = name;
            btn.onclick = () => initTimer(name); grid.appendChild(btn);
        });
    }

    window.initTimer = (equipment) => {
        currentCrane = equipment; 
        const inputDiv = document.getElementById('dynamic-inputs'); inputDiv.innerHTML = '';
        document.getElementById('modeToggleContainer').classList.remove('hidden');

        if (equipment === 'QC') {
            inputDiv.innerHTML = `
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="staffId" placeholder="OP-ID" class="dark-input text-xs">
                    <input type="text" id="unitNo" placeholder="CRANE#" class="dark-input text-xs text-center">
                </div>
                <label class="setup-label">Measurement Type</label>
                <select id="qcCategory" onchange="window.updateQCCategory(this.value)" class="dark-input text-xs w-full">
                    <option value="Above Deck">Above Deck</option>
                    <option value="Below Deck">Below Deck</option>
                    <option value="Hatch cover">Hatch cover</option>
                    <option value="OOG (OHF)">OOG (OHF)</option>
                    <option value="OOG (Wire sling)">OOG (Wire sling)</option>
                </select>`;
            currentCategory = 'Above Deck';
        } else {
            inputDiv.innerHTML = `<input type="text" id="staffId" placeholder="OP-ID" class="dark-input text-xs"><input type="text" id="unitNo" placeholder="UNIT#" class="dark-input text-xs">`;
        }
        
        resetCurrentTimerUI(); updateMode('LOADING'); window.showScreen('timer-screen');
    };

    window.updateQCCategory = (val) => { currentCategory = val; renderSteps(); };

    window.updateMode = (mode) => {
        if (startTime) return;
        currentMode = mode;
        const l = document.getElementById('m-load'); const d = document.getElementById('m-dis');
        if (mode === 'LOADING') { l.classList.add('mode-active'); l.classList.remove('opacity-30'); d.classList.remove('mode-active'); d.classList.add('opacity-30'); }
        else { d.classList.add('mode-active'); d.classList.remove('opacity-30'); l.classList.remove('mode-active'); l.classList.add('opacity-30'); }
        renderSteps();
    };

    function renderSteps() {
        const grid = document.getElementById('step-grid'); grid.innerHTML = '';
        if (currentCrane === 'QC') {
            currentSteps = config.QC[currentCategory]?.[currentMode] || config.DEFAULT;
        } else {
            currentSteps = config[currentCrane]?.[currentMode] || config[currentCrane] || config.DEFAULT;
        }
        currentSteps.forEach((text, i) => {
            const btn = document.createElement('button'); btn.id = `s${i+1}`; btn.className = 'btn-calc btn-step step-available'; btn.innerText = text; btn.disabled = (i !== 0); btn.onclick = () => triggerStep(i + 1); grid.appendChild(btn);
        });
    }

    function triggerStep(num) {
        const now = Date.now();
        const stopBtnEl = document.getElementById('stop-cycle-btn');
        if (num === 1 && !stopBtnEl.classList.contains('hidden')) finalizeCycleSilently(now);
        if (num === 1) {
            startTime = now; lastTime = now; totalWaitingDuration = 0;
            currentCycleData = { 
                Date: new Date().toLocaleDateString(), 
                Equipment: currentCrane, 
                Staff: document.getElementById('staffId')?.value || "N/A",
                Unit: document.getElementById('unitNo')?.value || "N/A",
                Category: currentCategory, 
                Operation: currentMode 
            };
            clearInterval(activeInterval);
            activeInterval = setInterval(() => { document.getElementById('main-timer').innerText = ((Date.now() - startTime) / 1000).toFixed(2); }, 50);
            stopBtnEl.classList.add('hidden');
        } else { currentCycleData[`Step_${num - 1}`] = ((now - lastTime) / 1000).toFixed(2); }
        document.querySelectorAll('.btn-step').forEach(b => { b.disabled = true; b.classList.remove('step-active'); b.classList.add('step-available'); });
        const act = document.getElementById(`s${num}`); act.classList.replace('step-available', 'step-active'); act.disabled = false;
        if (num === currentSteps.length) { stopBtnEl.classList.remove('hidden'); document.getElementById('s1').disabled = false; }
        else { document.getElementById(`s${num + 1}`).disabled = false; }
        lastTime = now;
    }

    function finalizeCycleSilently(now) {
        clearInterval(activeInterval);
        const net = ((now - startTime) / 1000).toFixed(2);
        const waiting = (totalWaitingDuration / 1000).toFixed(2);
        const gross = (parseFloat(net) + parseFloat(waiting)).toFixed(2);
        
        currentCycleData[`Step_${currentSteps.length}`] = ((now - lastTime) / 1000).toFixed(2);
        currentCycleData['Net_Cycle'] = net;
        currentCycleData['Waiting'] = waiting;
        currentCycleData['Gross_Cycle'] = gross;
        
        document.getElementById('last-cycle-display').innerText = net;
        logs.push({ ...currentCycleData }); 
        cycleCount++;
        document.getElementById('cycle-count').innerText = cycleCount;
        
        saveLogsToLocal(); // Persistence
    }

    window.stopCycle = () => { 
        finalizeCycleSilently(Date.now()); 
        document.getElementById('recordModal').classList.remove('hidden'); 
        setTimeout(() => { document.getElementById('recordModal').classList.add('hidden'); resetCurrentTimerUI(); }, 1000); 
    };

    window.togglePause = () => { 
        if (!startTime) return; 
        const pBtn = document.getElementById('pause-btn'); 
        if (!isPaused) { isPaused = true; delayStart = Date.now(); pBtn.style.opacity = '0.5'; clearInterval(activeInterval); } 
        else { isPaused = false; let d = Date.now() - delayStart; startTime += d; lastTime += d; pBtn.style.opacity = '1'; activeInterval = setInterval(() => { document.getElementById('main-timer').innerText = ((Date.now() - startTime) / 1000).toFixed(2); }, 50); } 
    };

    window.toggleWaiting = () => { 
        if (!startTime) return; 
        const wBtn = document.getElementById('wait-btn'); 
        if (!isWaiting) { isWaiting = true; delayStart = Date.now(); wBtn.style.opacity = '0.5'; clearInterval(activeInterval); } 
        else { isWaiting = false; let d = Date.now() - delayStart; totalWaitingDuration += d; startTime += d; lastTime += d; wBtn.style.opacity = '1'; activeInterval = setInterval(() => { document.getElementById('main-timer').innerText = ((Date.now() - startTime) / 1000).toFixed(2); }, 50); } 
    };

    function resetCurrentTimerUI() { 
        clearInterval(activeInterval); startTime = null; isPaused = false; isWaiting = false; 
        document.getElementById('main-timer').innerText = "0.00"; 
        document.getElementById('stop-cycle-btn').classList.add('hidden'); 
        document.getElementById('pause-btn').style.opacity = '1'; 
        document.getElementById('wait-btn').style.opacity = '1'; 
        renderSteps(); 
    }

    window.downloadReport = () => { 
        if (logs.length === 0) return showToast("NO DATA LOGGED"); 
        
        const keys = Array.from(new Set(logs.flatMap(l => Object.keys(l)))); 
        let csv = "\ufeff" + keys.map(k => `"${k}"`).join(",") + "\r\n"; 
        
        let sumNet = 0, sumGross = 0, sumWait = 0;

        logs.forEach(l => { 
            csv += keys.map(k => `"${l[k] || '0.00'}"`).join(",") + "\r\n"; 
            sumNet += parseFloat(l['Net_Cycle'] || 0);
            sumGross += parseFloat(l['Gross_Cycle'] || 0);
            sumWait += parseFloat(l['Waiting'] || 0);
        }); 

        const avgNet = (sumNet / logs.length).toFixed(2);
        const avgGross = (sumGross / logs.length).toFixed(2);
        const avgWait = (sumWait / logs.length).toFixed(2);

        // Add Summary Section
        csv += "\r\n\r\n";
        csv += `"SUMMARY REPORT",\r\n`;
        csv += `"Total Cycles recorded","${logs.length}"\r\n`;
        csv += `"Average Net Cycle Time","${avgNet} seconds"\r\n`;
        csv += `"Average Gross Cycle Time","${avgGross} seconds"\r\n`;
        csv += `"Average Waiting Time","${avgWait} seconds"\r\n`;

        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" }); 
        const link = document.createElement("a"); 
        link.href = URL.createObjectURL(blob); 
        link.download = `Performance_Report_${new Date().getTime()}.csv`; 
        link.click(); 
        showToast("REPORT EXPORTED"); 
    };

    window.closeModal = () => { document.getElementById('custom-modal-overlay').style.display = 'none'; };
    window.openModal = (title, msg, onConfirm) => { 
        document.getElementById('modal-title').innerText = title; 
        document.getElementById('modal-msg').innerText = msg; 
        document.getElementById('custom-modal-overlay').style.display = 'flex'; 
        document.getElementById('modal-confirm-btn').onclick = () => { onConfirm(); closeModal(); }; 
    };

    window.goHome = () => { 
        if (startTime) { 
            openModal("ABORT MEASUREMENT?", "All current timing data will be lost.", () => { resetCurrentTimerUI(); window.showScreen(window.parentScreen); }); 
        } else { window.showScreen(window.parentScreen); } 
    };

    window.openQuickManual = () => {
        document.getElementById('manualEquipId').value = '';
        document.getElementById('manualStaffId').value = '';
        document.getElementById('manualStepList').innerHTML = '';
        window.showScreen('manual-setup-screen');
    };

    window.addManualStep = () => { 
        let i = document.getElementById('manualStepInput'); 
        if (i && i.value.trim()) { 
            const list = document.getElementById('manualStepList');
            const d = document.createElement('div');
            d.className = 'flex justify-between items-center bg-black/40 p-3 rounded-lg border border-white/5';
            d.innerHTML = `<span class="text-xs font-bold">${i.value}</span>`;
            list.appendChild(d);
            i.value = '';
        } 
    };

    window.openManualTimer = () => {
        showToast("Feature under configuration");
    };

    window.onload = function() { 
        loadLogsFromLocal();
        updateConnStatus();
        window.showScreen('home-screen'); 
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Timer Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --orange: #ff9800; 
            --white: #ffffff; 
            --bg: #f8f9fa; 
            --dark: #212529; 
            --danger: #ef4444; 
            --success: #10b981;
            --ct-blue: #0891b2;
            --mr-teal: #0d9488;
        }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; justify-content: center; position: relative; min-height: 100vh; }
        
        .screen { width: 100%; max-width: 500px; min-height: 100vh; background: white; display: none; padding: 20px; box-sizing: border-box; position: relative; }
        .active { display: block; }

        /* HOME NAVIGATION CARDS */
        .menu-card { 
            padding: 24px; border-radius: 20px; border: none; color: white; cursor: pointer; 
            display: flex; align-items: center; justify-content: space-between; 
            font-size: 1.3rem; font-weight: 800; transition: transform 0.1s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .menu-card:active { transform: scale(0.97); }
        
        /* STEP BUTTONS - Dark Grey to Black */
        .btn-step { 
            height: 85px; border: none; border-radius: 15px; 
            font-size: 0.75rem; font-weight: 700; color: white; 
            cursor: pointer; display: flex; align-items: center; 
            justify-content: center; text-align: center; padding: 8px; 
            line-height: 1.2; transition: all 0.2s; 
        }
        /* Default state: Dark Grey */
        .step-available { background-color: #4b5563 !important; } 
        /* Pressed/Active state: Black */
        .step-active { background-color: #000000 !important; } 
        
        .btn-step:disabled { opacity: 0.35; cursor: not-allowed; filter: grayscale(30%); }

        /* EQUIPMENT GRID */
        .equip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .equip-item { 
            padding: 20px 10px; border-radius: 15px; border: none; background: var(--orange); 
            color: white; font-weight: 800; font-size: 1rem; cursor: pointer; text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .equip-item:active { opacity: 0.9; transform: translateY(2px); }

        /* MANUAL SETUP STYLES - DARK OUTLINES */
        .manual-setup-input { border: 2px solid #0f172a; padding: 14px; border-radius: 12px; width: 100%; font-weight: 700; outline: none; background: #fff; }
        .manual-setup-input:focus { border-color: #38bdf8; }
        .manual-setup-label { font-size: 0.65rem; font-weight: 900; text-transform: uppercase; color: #1e293b; margin-bottom: 4px; display: block; }

        /* TOAST & MODAL */
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--dark); color: white; padding: 12px 25px; border-radius: 30px; font-weight: 600; font-size: 0.9rem; display: none; z-index: 2000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        #custom-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        #custom-modal { background: white; padding: 25px; border-radius: 15px; max-width: 300px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    
        /* Active Mode Style */
        .mode-active { background-color: #000000 !important; color: white !important; border-color: #000000 !important; }
    </style>
</head>
<body>

    <!-- OVERLAYS -->
    <div id="custom-modal-overlay">
        <div id="custom-modal">
            <h3 id="modal-title" class="text-lg font-black uppercase">Confirmation</h3>
            <p id="modal-msg" class="text-slate-500 mt-2 font-bold">Are you sure?</p>
            <div class="flex gap-3 mt-6">
                <button class="flex-1 py-3 bg-slate-100 rounded-xl font-black text-xs" onclick="closeModal()">CANCEL</button>
                <button class="flex-1 py-3 bg-red-500 text-white rounded-xl font-black text-xs" id="modal-confirm-btn">YES</button>
            </div>
        </div>
    </div>
    <div id="toast">Message</div>

    <!-- HOME SCREEN -->
    <div id="home-screen" class="screen active">
        <div class="text-center mt-4 mb-8">
            <h1 class="text-4xl font-black text-[#212529]">Cycle Timer</h1>
            <p class="text-slate-400 font-bold uppercase tracking-widest text-xs mt-1">Main Selection Dashboard</p>
        </div>

        <div class="grid grid-cols-1 gap-4">
            <button class="menu-card bg-[#ff9800]" onclick="showScreen('ct-ops-screen')">
                <span>CT OPS</span>
                <i class="fa-solid fa-ship"></i>
            </button>
            <button class="menu-card bg-[#0891b2]" onclick="showScreen('gct-ops-screen')">
                <span>GCT OPS</span>
                <i class="fa-solid fa-boxes-stacked"></i>
            </button>
            <button class="menu-card bg-[#0d9488]" onclick="showScreen('mr-screen')">
                <span>M&R</span>
                <i class="fa-solid fa-screwdriver-wrench"></i>
            </button>
            <button class="menu-card bg-slate-600" onclick="showScreen('manual-setup-screen')">
                <span>MANUAL</span>
                <i class="fa-solid fa-keyboard"></i>
            </button>
        </div>

        <div class="text-right mt-10 text-[10px] font-black text-black uppercase tracking-widest">
            Developed By: Mr. Golden Micheal - Port of Salalah.
        </div>
    </div>

    <!-- MANUAL SETUP SCREEN -->
    <div id="manual-setup-screen" class="screen">
        <button class="flex items-center gap-2 bg-slate-100 px-4 py-2 rounded-lg font-black text-xs mb-6" onclick="showScreen('home-screen')">
            <i class="fas fa-arrow-left"></i> BACK
        </button>
        <div class="space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="manual-setup-label">Equipment ID</label>
                    <input type="text" id="manualEquipId" placeholder="ID" class="manual-setup-input">
                </div>
                <div>
                    <label class="manual-setup-label">Staff ID</label>
                    <input type="text" id="manualStaffId" placeholder="Staff" class="manual-setup-input">
                </div>
            </div>
            <div>
                <label class="manual-setup-label">Process Title</label>
                <input type="text" id="manualProcessTitle" placeholder="Process Name" class="manual-setup-input">
            </div>
            <hr class="border-slate-100">
            <div>
                <label class="manual-setup-label">Add Steps <span class="text-red-500">*</span></label>
                <div class="flex gap-2">
                    <input type="text" id="manualStepInput" placeholder="New step name..." class="manual-setup-input">
                    <button onclick="addManualStep()" class="bg-blue-600 text-white px-6 rounded-xl font-black uppercase text-xs active:scale-95 transition">Add</button>
                </div>
            </div>
            <div id="manualStepList" class="space-y-2 max-h-[250px] overflow-y-auto"></div>
            <button onclick="openManualTimer()" class="w-full bg-[#1e293b] text-white py-6 rounded-[20px] font-black uppercase tracking-widest text-lg shadow-xl active:scale-95 transition mt-4">
                DONE - OPEN TIMER
            </button>
        </div>
    </div>

    <!-- UNIFIED TIMER SCREEN -->
    <div id="timer-screen" class="screen">
        <!-- Top Bar -->
        <div class="flex justify-between items-center mb-4">
            <button id="timer-home-btn" class="flex items-center gap-1 text-slate-500 font-bold hover:text-slate-800 transition text-xs">
                <i class="fas fa-home w-4 h-4"></i> HOME
            </button>
            <div id="dateDisplay" class="text-[10px] font-black text-slate-400 uppercase tracking-widest"></div>
        </div>

        <!-- Dynamic Operation Inputs -->
        <div id="standard-inputs" class="mb-4">
            <div class="mode-toggle flex gap-3 mb-3">
                <button id="m-load" class="flex-1 py-4 rounded-2xl border-2 border-slate-900 bg-white font-black text-xs" onclick="updateMode('LOADING')">LOADING</button>
                <button id="m-dis" class="flex-1 py-4 rounded-2xl border-2 border-slate-200 bg-white font-black text-xs" onclick="updateMode('DISCHARGE')">DISCHARGE</button>
            </div>
            <div id="dynamic-inputs" class="space-y-2"></div>
        </div>

        <!-- Timer Display -->
        <div class="timer-container shadow-2xl bg-[#212529] rounded-[24px] p-8 relative w-full mb-4">
            <div class="absolute top-3 right-3 bg-[#ff9f00] text-white px-3 py-1 rounded-lg font-black text-[0.7rem] uppercase">
                Cycles: <span id="cycle-count">0</span>
            </div>
            <div id="main-timer" class="font-black text-[#00d2ff] text-center leading-none text-[5.5rem]">0.00</div>
        </div>

        <!-- Controls (Pause/Wait) -->
        <div class="grid grid-cols-2 gap-3 mb-3">
            <button id="pause-btn" onclick="togglePause()" class="bg-[#adb5bd] text-white py-4 rounded-2xl font-black uppercase tracking-wider active:scale-95 transition">Pause</button>
            <button id="wait-btn" onclick="toggleWaiting()" class="bg-[#adb5bd] text-white py-4 rounded-2xl font-black uppercase tracking-wider active:scale-95 transition">Waiting</button>
        </div>

        <!-- Reset Controls -->
        <div class="grid grid-cols-2 gap-3 mb-4">
            <button onclick="undoLastCycle()" class="bg-[#495057] text-white py-4 text-[10px] uppercase font-black rounded-xl active:scale-95 transition">Reset Last Cycle</button>
            <button onclick="resetFullSession()" class="bg-[#64748b] text-white py-4 text-[10px] uppercase font-black rounded-xl active:scale-95 transition">Reset Full</button>
        </div>

        <!-- Steps Grid -->
        <div id="step-grid" class="grid grid-cols-2 gap-3 pt-2"></div>

        <!-- Large Stop & Record Button -->
        <button id="stop-cycle-btn" onclick="stopCycle()" class="w-full py-6 bg-[#e11d48] text-white text-2xl font-black uppercase tracking-widest mt-4 shadow-xl active:scale-95 transition rounded-[20px] hidden">
            STOP & RECORD
        </button>

        <!-- Download Action -->
        <button onclick="downloadReport()" class="w-full py-5 bg-[#212529] text-white text-lg font-black uppercase tracking-widest mt-6 shadow-xl active:scale-95 transition rounded-2xl">
            Download Report (CSV)
        </button>

        <div id="session-status" class="text-center text-[10px] font-black text-slate-400 uppercase tracking-widest py-4">
            Waiting - Click Step 1
        </div>
    </div>

    <!-- CYCLE RECORDED SUCCESS MODAL -->
    <div id="recordModal" class="fixed inset-0 flex items-center justify-center bg-black/70 backdrop-blur-sm z-50 hidden">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl text-center mx-4 w-full max-sm">
            <div class="w-16 h-16 bg-green-500 text-white rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-check text-3xl"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 uppercase">Cycle Recorded!</h2>
            <p class="text-slate-500 font-bold uppercase text-xs mt-2">Ready for next cycle</p>
        </div>
    </div>

    <!-- OPERATIONS SCREENS -->
    <div id="ct-ops-screen" class="screen">
        <button class="bg-slate-100 px-4 py-2 rounded-lg font-black text-xs mb-6" onclick="showScreen('home-screen')"><i class="fas fa-arrow-left"></i> BACK</button>
        <h2 class="text-center text-xl font-black text-[#ff9800] uppercase mb-6">CT OPERATIONS</h2>
        <div class="equip-grid">
            <button class="equip-item" onclick="initTimer('QC')">QC</button>
            <button class="equip-item" onclick="initTimer('RTG')">RTG</button>
            <button class="equip-item" onclick="initTimer('TT')">TT</button>
            <button class="equip-item" onclick="initTimer('EH')">EH</button>
            <button class="equip-item" onclick="initTimer('RS')">RS</button>
            <button class="equip-item" onclick="initTimer('FLT')">FLT</button>
            <button class="equip-item" onclick="initTimer('LASHER')">LASHER</button>
            <button class="equip-item" onclick="initTimer('DOWELMAN')">DOWELMAN</button>
        </div>
    </div>

    <div id="gct-ops-screen" class="screen">
        <button class="bg-slate-100 px-4 py-2 rounded-lg font-black text-xs mb-6" onclick="showScreen('home-screen')"><i class="fas fa-arrow-left"></i> BACK</button>
        <h2 class="text-center text-xl font-black text-[#0891b2] uppercase mb-6">GCT OPERATIONS</h2>
        <div class="equip-grid">
            <button class="equip-item bg-[#0891b2]" onclick="initTimer('MHC_LOOSE')">MHC Loose cargo</button>
            <button class="equip-item bg-[#0891b2]" onclick="initTimer('LASHER')">LASHER</button>
            <button class="equip-item bg-[#0891b2]" onclick="initTimer('BAGGED_CARGO')">Crane- bagged cargo</button>
            <button class="equip-item bg-[#0891b2]" onclick="initTimer('FLT')">FLT</button>
            <button class="equip-item bg-[#0891b2]" onclick="initTimer('RTG')">RTG</button>
            <button class="equip-item bg-[#0891b2]" onclick="initTimer('RS')">RS</button>
        </div>
    </div>

    <div id="mr-screen" class="screen">
        <button class="bg-slate-100 px-4 py-2 rounded-lg font-black text-xs mb-6" onclick="showScreen('home-screen')"><i class="fas fa-arrow-left"></i> BACK</button>
        <h2 class="text-center text-xl font-black text-[#0d9488] uppercase mb-6">M&R</h2>
        <div class="equip-grid">
            <button class="equip-item bg-[#0d9488] col-span-2" onclick="initTimer('M&R')">M&R LOG</button>
        </div>
    </div>

<script>
    let logs = [];
    let currentCrane = '';
    let currentMode = 'LOADING';
    let currentSteps = [];
    let cycleCount = 0;
    let activeInterval = null;
    let startTime = null;     
    let absoluteStartTime = null; 
    let lastTime = null;
    let isPaused = false;
    let isWaiting = false;
    let totalWaitingDuration = 0; 
    let delayStart = null;
    let currentCycleData = {};
    let manualSteps = [];
    let isManualMode = false;

    const config = {
        QC: {
            LOADING: ["1. FROM PARK POSITION TO ADJUST ON TRUCK", "2. FROM START ADJUSTING ON TRUCK TO TO LOCK THE CONTAINER ON TRUCK", "3. FROM LOCK ON CONTAINER ON TRUCK TO SILL BEAM", "4. FROM SILL BEAM TO START ADJUSTING ON TARGET ROW", "5. FROM START ADJUSTING ON TARGET ROW TO UNLOCK", "6. FROM UNLOCK TO SILL BEAM"],
            DISCHARGE: ["1. FROM PARK TO SILL BEAM TO START TARGET ROW", "2. FROM START ADJUSTING ON CONTAINER TO LOCK", "3. FROM LOCK TO SILL BEAM", "4. FROM SILL BEAM TO START ADJUSTING ON TRUCK", "5. FROM START ADJUSTING ON TRUCK TO UNLOCK ON TRUCK", "6. FROM UNLOCK TRUCK TO SILL BEAM/PARK POSITION"]
        },
        RTG: {
            LOADING: ["1. FROM PARK POSITION TO LOCK CONTAINER IN THE BAY", "2. FROM LOCK IN THE BAY TO A-ROW", "3. FROM A- ROW TO UNLOCK ON TRUCK", "4. FROM UNLOCK ON TRUCK TO PARK POSITION"],
            DISCHARGE: ["1. FROM PARK POSITION TO LOCK ON TRUCK", "2. FROM LOCK ON TRUCK TO UNLOCK ON TARGET ROW", "3. FROM UNLOCK TO PARK POSITION"]
        },
        TT: {
            LOADING: ["1. Container lifted by QC", "2. Move to yard RTG location", "3. Received container from RTG", "4. Move to PULL position", "5. Move to pinning area", "6. Fixing twistlock", "7. Move to standby position", "8. Move to under crane"],
            DISCHARGE: ["1. Received container from QC", "2. Move to pinning station", "3. Twistlocks removed", "4. Move to RTG", "5. Containers discharged", "6. Move to PULL position", "7. Move to standby position", "8. Move to under crane"]
        },
        DEFAULT: ["1. Start operation", "2. In progress", "3. Completion"]
    };

    function showToast(msg, type = '') {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.className = type ? `toast-${type}` : '';
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 2500);
    }

    function openModal(title, msg, onConfirm) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-msg').innerText = msg;
        document.getElementById('custom-modal-overlay').style.display = 'flex';
        document.getElementById('modal-confirm-btn').onclick = () => { onConfirm(); closeModal(); };
    }

    function closeModal() { document.getElementById('custom-modal-overlay').style.display = 'none'; }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function initTimer(equipment) {
        isManualMode = false;
        currentCrane = equipment;
        currentMode = 'LOADING';
        const inputDiv = document.getElementById('dynamic-inputs');
        inputDiv.innerHTML = '';
        
        const darkInputClass = "p-3 border-2 border-slate-900 rounded-xl text-xs font-black outline-none bg-white text-slate-900 placeholder-slate-500";

        if (equipment === 'QC') {
            inputDiv.innerHTML = `
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="staffId" placeholder="STAFF ID" class="${darkInputClass}">
                    <input type="text" id="unitNo" placeholder="QC#" class="${darkInputClass} text-center">
                </div>
                <select id="category" onchange="renderSteps()" class="${darkInputClass} w-full">
                    <option value="Above deck">Above deck</option>
                    <option value="Below deck">Below deck</option>
                    <option value="Hatch cover">Hatch cover</option>
                    <option value="OOG">OOG</option>
                </select>`;
        } else {
            inputDiv.innerHTML = `
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="staffId" placeholder="STAFF ID" class="${darkInputClass}">
                    <input type="text" id="unitNo" placeholder="UNIT NO" class="${darkInputClass}">
                </div>`;
        }

        document.getElementById('standard-inputs').classList.remove('hidden');
        document.getElementById('timer-home-btn').onclick = goHome;
        
        // Ensure Loading is selected by default
        updateMode('LOADING');
        
        resetCurrentTimerUI();
        renderSteps();
        showScreen('timer-screen');
    }

    function updateMode(mode) {
        // Only allow change if timer hasn't started
        if (startTime) return;
        currentMode = mode;
        
        // CSS Toggle for Loading/Discharge
        const loadBtn = document.getElementById('m-load');
        const disBtn = document.getElementById('m-dis');
        
        if (mode === 'LOADING') {
            loadBtn.className = 'flex-1 py-4 rounded-2xl border-2 border-slate-900 font-black text-xs mode-active';
            disBtn.className = 'flex-1 py-4 rounded-2xl border-2 border-slate-200 bg-white font-black text-xs text-slate-400';
        } else {
            disBtn.className = 'flex-1 py-4 rounded-2xl border-2 border-slate-900 font-black text-xs mode-active';
            loadBtn.className = 'flex-1 py-4 rounded-2xl border-2 border-slate-200 bg-white font-black text-xs text-slate-400';
        }
        
        renderSteps();
    }

    function renderSteps() {
        const grid = document.getElementById('step-grid');
        grid.innerHTML = '';
        let steps = isManualMode ? manualSteps : (config[currentCrane]?.[currentMode] || config[currentCrane] || config.DEFAULT);
        currentSteps = steps;

        steps.forEach((text, i) => {
            const btn = document.createElement('button');
            btn.id = `s${i+1}`;
            btn.className = 'btn-step step-available'; // Start as Dark Grey
            btn.innerText = text;
            btn.disabled = (i !== 0);
            btn.onclick = () => triggerStep(i + 1);
            grid.appendChild(btn);
        });
    }

    function triggerStep(num) {
        const now = Date.now();
        if (navigator.vibrate) navigator.vibrate(40);

        const stopBtn = document.getElementById('stop-cycle-btn');
        if (num === 1 && !stopBtn.classList.contains('hidden')) {
            finalizeCycleSilently(now);
        }

        if (num === 1) {
            startTime = now; absoluteStartTime = now; lastTime = now; totalWaitingDuration = 0;
            currentCycleData = isManualMode ? {
                Date: new Date().toLocaleDateString(), Time: new Date().toLocaleTimeString(),
                Equipment: document.getElementById('manualEquipId').value || "Manual",
                Staff_ID: document.getElementById('manualStaffId').value || "N/A",
                Process: document.getElementById('manualProcessTitle').value || "Custom"
            } : {
                Date: new Date().toLocaleDateString(), Time: new Date().toLocaleTimeString(),
                Equipment: currentCrane,
                Staff_ID: document.getElementById('staffId')?.value || "N/A",
                Unit_No: document.getElementById('unitNo')?.value || "N/A",
                Operation: currentMode
            };

            activeInterval = setInterval(() => {
                document.getElementById('main-timer').innerText = ((Date.now() - startTime) / 1000).toFixed(2);
            }, 50);
            document.getElementById('pause-btn').disabled = false;
            document.getElementById('wait-btn').disabled = false;
            document.getElementById('session-status').innerText = "RECORDING - IN PROGRESS";
            document.getElementById('stop-cycle-btn').classList.add('hidden');
        } else {
            currentCycleData[`Step_${num - 1}`] = ((now - lastTime) / 1000).toFixed(2);
        }

        const btns = document.querySelectorAll('.btn-step');
        btns.forEach(b => { 
            b.disabled = true; 
            b.classList.remove('step-active');
            b.classList.add('step-available');
        });
        
        // Active Step becomes BLACK
        const activeBtn = document.getElementById(`s${num}`);
        activeBtn.classList.remove('step-available');
        activeBtn.classList.add('step-active');
        activeBtn.disabled = false;

        if (num === currentSteps.length) {
            document.getElementById('stop-cycle-btn').classList.remove('hidden');
            document.getElementById('stop-cycle-btn').disabled = false;
            document.getElementById('session-status').innerText = "LAST STEP - STOP OR RESTART";
            document.getElementById('s1').disabled = false; 
            document.getElementById('s1').classList.add('opacity-100');
        } else {
            const next = document.getElementById(`s${num + 1}`);
            if (next) next.disabled = false;
        }
        lastTime = now;
    }

    function finalizeCycleSilently(now) {
        clearInterval(activeInterval);
        currentCycleData[`Step_${currentSteps.length}`] = ((now - lastTime) / 1000).toFixed(2);
        currentCycleData['Net_Cycle_Time'] = ((now - startTime) / 1000).toFixed(2);
        currentCycleData['Gross_Cycle_Time'] = ((now - absoluteStartTime) / 1000).toFixed(2);
        currentCycleData['Waiting_Time'] = (totalWaitingDuration / 1000).toFixed(2);

        logs.push({ ...currentCycleData });
        cycleCount++;
        document.getElementById('cycle-count').innerText = cycleCount;
        showToast("Cycle Saved!", "success");
    }

    function stopCycle() {
        const now = Date.now();
        finalizeCycleSilently(now);
        document.getElementById('recordModal').classList.remove('hidden');
        setTimeout(() => {
            document.getElementById('recordModal').classList.add('hidden');
            resetCurrentTimerUI();
        }, 1200);
    }

    function togglePause() {
        if (!startTime) return;
        const btn = document.getElementById('pause-btn');
        if (!isPaused) {
            if (isWaiting) toggleWaiting();
            isPaused = true; delayStart = Date.now(); btn.classList.add('bg-amber-500'); clearInterval(activeInterval);
        } else {
            isPaused = false; let diff = (Date.now() - delayStart); startTime += diff; lastTime += diff;
            btn.classList.remove('bg-amber-500');
            activeInterval = setInterval(() => { document.getElementById('main-timer').innerText = ((Date.now() - startTime) / 1000).toFixed(2); }, 50);
        }
    }

    function toggleWaiting() {
        if (!startTime) return;
        const btn = document.getElementById('wait-btn');
        if (!isWaiting) {
            if (isPaused) togglePause();
            isWaiting = true; delayStart = Date.now(); btn.classList.add('bg-cyan-500'); clearInterval(activeInterval);
        } else {
            isWaiting = false; let diff = (Date.now() - delayStart); totalWaitingDuration += diff; startTime += diff; lastTime += diff;
            btn.classList.remove('bg-cyan-500');
            activeInterval = setInterval(() => { document.getElementById('main-timer').innerText = ((Date.now() - startTime) / 1000).toFixed(2); }, 50);
        }
    }

    function undoLastCycle() {
        if (logs.length > 0) {
            openModal("Undo Cycle", "Remove last recorded cycle?", () => {
                logs.pop();
                cycleCount = Math.max(0, cycleCount - 1);
                document.getElementById('cycle-count').innerText = cycleCount;
                resetCurrentTimerUI();
                showToast("Cycle Removed", "success");
            });
        }
    }

    function resetFullSession() {
        openModal("Reset Full", "Delete ALL cycle records for this session?", () => {
            logs = [];
            cycleCount = 0;
            document.getElementById('cycle-count').innerText = "0";
            resetCurrentTimerUI();
            showToast("Session Cleared", "success");
        });
    }

    function resetCurrentTimerUI() {
        clearInterval(activeInterval);
        startTime = null; absoluteStartTime = null; isPaused = false; isWaiting = false; totalWaitingDuration = 0;
        document.getElementById('main-timer').innerText = "0.00";
        document.getElementById('stop-cycle-btn').classList.add('hidden');
        document.getElementById('pause-btn').classList.remove('bg-amber-500');
        document.getElementById('wait-btn').classList.remove('bg-cyan-500');
        document.getElementById('session-status').innerText = "Waiting - Click Step 1";
        renderSteps();
    }

    function goHome() {
        if (startTime) openModal("Exit?", "Discard current measurement?", () => { resetCurrentTimerUI(); showScreen('home-screen'); });
        else showScreen('home-screen');
    }

    function getAverage(vals) {
        if (!vals.length) return "0.00";
        return (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(2);
    }

    function getMedian(vals) {
        if (!vals.length) return "0.00";
        const sorted = [...vals].sort((a, b) => a - b);
        const mid = Math.floor(sorted.length / 2);
        return (sorted.length % 2 !== 0 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2).toFixed(2);
    }

    function downloadReport() {
        if (logs.length === 0) return showToast("No recorded cycles.", "error");
        
        let allKeysSet = new Set();
        logs.forEach(log => Object.keys(log).forEach(k => allKeysSet.add(k)));
        const headers = Array.from(allKeysSet);

        let csvRows = [headers.map(h => `"${h}"`).join(',')];
        logs.forEach(log => {
            csvRows.push(headers.map(h => `"${log[h] || '0.00'}"`).join(','));
        });

        csvRows.push("");
        csvRows.push("");
        const metrics = ['Net_Cycle_Time', 'Gross_Cycle_Time', 'Waiting_Time'];
        csvRows.push(`"Metric","${metrics[0]}","${metrics[1]}","${metrics[2]}"`);

        const netVals = logs.map(l => parseFloat(l.Net_Cycle_Time) || 0);
        const grossVals = logs.map(l => parseFloat(l.Gross_Cycle_Time) || 0);
        const waitVals = logs.map(l => parseFloat(l.Waiting_Time) || 0);

        csvRows.push(`"Average","${getAverage(netVals)}","${getAverage(grossVals)}","${getAverage(waitVals)}"`);
        csvRows.push(`"Median","${getMedian(netVals)}","${getMedian(grossVals)}","${getMedian(waitVals)}"`);

        const blob = new Blob(['\ufeff', csvRows.join('\n')], { type: "text/csv;charset=utf-8" });
        const link = document.createElement("a");
        const filename = `${isManualMode ? 'Manual' : currentCrane}_Report_${new Date().toISOString().slice(0,10)}.csv`;
        
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", filename);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        showToast("Report Exported (CSV)", "success");
    }

    function addManualStep() {
        const input = document.getElementById('manualStepInput');
        if (input.value.trim()) {
            manualSteps.push(input.value.trim());
            renderManualSetupList();
            input.value = '';
        }
    }

    function renderManualSetupList() {
        const list = document.getElementById('manualStepList');
        list.innerHTML = '';
        manualSteps.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = 'flex justify-between items-center bg-slate-50 p-3 rounded-lg border-2 border-slate-900 mb-2';
            div.innerHTML = `<span class="font-bold text-slate-900 text-xs">${i+1}. ${s}</span><button onclick="manualSteps.splice(${i}, 1); renderManualSetupList();" class="text-red-500 font-black text-[10px]">REMOVE</button>`;
            list.appendChild(div);
        });
    }

    function openManualTimer() {
        if (manualSteps.length === 0) return showToast("Add at least one step.", "error");
        isManualMode = true;
        document.getElementById('standard-inputs').classList.add('hidden');
        document.getElementById('timer-home-btn').onclick = goHome;
        cycleCount = 0;
        logs = [];
        document.getElementById('cycle-count').innerText = "0";
        resetCurrentTimerUI();
        showScreen('timer-screen');
    }
</script>
</body>
</html>
